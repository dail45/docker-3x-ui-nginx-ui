# ============================================================
# Architecture:
#   443 (stream, SNI) ──► SNI = www.google.com     → 3x-ui:8443 (Xray Reality)
#                    └──► SNI = YOUR_DOMAIN        → nginx:7443 (HTTPS)
#
#   nginx:7443 ──► /panel/    → 3x-ui:2053
#             └──► /nginx-ui/ → nginx-ui:9000
# ============================================================

services:
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: 3x-ui
    restart: unless-stopped
    volumes:
      - ./3x-ui/db:/etc/x-ui
      - ./3x-ui/cert:/root/cert
      - ./nginx/ssl:/etc/nginx/ssl:ro
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
    networks:
      - proxy

  nginx-ui:
    image: uozi/nginx-ui:latest
    container_name: nginx-ui
    restart: unless-stopped
    environment:
      - NGINX_UI_IGNORE_DOCKER_SOCKET=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:rw
      - ./nginx/conf.d:/etc/nginx/conf.d:rw
      - ./nginx/sites-available:/etc/nginx/sites-available:rw
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:rw
      - ./nginx/streams-available:/etc/nginx/streams-available:rw
      - ./nginx/streams-enabled:/etc/nginx/streams-enabled:rw
      - ./nginx/html:/usr/share/nginx/html:rw
      - ./nginx-ui:/etc/nginx-ui
      - ./nginx/ssl:/etc/nginx/ssl:rw
      - nginx_logs:/var/log/nginx
    networks:
      - proxy
    depends_on:
      - 3x-ui

networks:
  proxy:
    driver: bridge

volumes:
  nginx_logs:
